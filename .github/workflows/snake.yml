  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow-x:hidden;cursor:crosshair;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.015) 2px,rgba(0,255,65,0.015) 4px);pointer-events:none;z-index:9999;}
  #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.07;pointer-events:none;z-index:0;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#0d1117;}::-webkit-scrollbar-thumb{background:var(--green);}
  .container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem 1.5rem;}
  .header{text-align:center;padding:5rem 0 2rem;position:relative;}
  .glitch-title{font-family:'Orbitron',sans-serif;font-size:clamp(3.5rem,10vw,7rem);font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(0,255,65,0.8),0 0 60px rgba(0,255,65,0.4);position:relative;display:inline-block;letter-spacing:0.1em;animation:glow-pulse 3s ease-in-out infinite;}
  @keyframes glow-pulse{0%,100%{text-shadow:0 0 20px rgba(0,255,65,0.8),0 0 60px rgba(0,255,65,0.4);}50%{text-shadow:0 0 40px #00ff41,0 0 100px rgba(0,255,65,0.6),0 0 150px rgba(0,255,65,0.3);}}
  .glitch-title::before,.glitch-title::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;}
  .glitch-title::before{color:var(--cyan);animation:glitch1 4s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);}
  .glitch-title::after{color:var(--red);animation:glitch2 4s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);}
  @keyframes glitch1{0%,90%,100%{transform:translate(0);}92%{transform:translate(-3px,1px);}94%{transform:translate(3px,-1px);}96%{transform:translate(-2px,2px);}}
  @keyframes glitch2{0%,88%,100%{transform:translate(0);}90%{transform:translate(3px,-2px);}93%{transform:translate(-3px,2px);}96%{transform:translate(2px,-1px);}}
  .subtitle{font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:0.3em;color:var(--green-dim);margin-top:0.8rem;text-transform:uppercase;}
  .terminal-line{font-size:0.85rem;color:var(--green);margin-top:1.5rem;min-height:1.4em;}
  .cursor{display:inline-block;width:10px;height:1em;background:var(--green);animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  .badges{display:flex;flex-wrap:wrap;justify-content:center;gap:0.5rem;margin:1.5rem 0;}
  .badge{font-size:0.68rem;padding:0.2rem 0.7rem;border:1px solid;font-family:'Share Tech Mono',monospace;letter-spacing:0.05em;transition:all 0.2s;}
  .badge:hover{transform:translateY(-2px);filter:brightness(1.4);}
  .b-g{border-color:var(--green);color:var(--green);}
  .b-c{border-color:var(--cyan);color:var(--cyan);}
  .b-r{border-color:var(--red);color:var(--red);}
  .b-o{border-color:var(--orange);color:var(--orange);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
  @media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr;}}
  .panel{border:1px solid var(--border);background:rgba(0,48,16,0.08);backdrop-filter:blur(4px);padding:1.5rem;position:relative;transition:all 0.3s;overflow:hidden;}
  .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);animation:scan-line 3s linear infinite;opacity:0;transition:opacity 0.3s;}
  .panel:hover::before{opacity:1;}
  .panel:hover{border-color:rgba(0,255,65,0.6);box-shadow:0 0 20px rgba(0,255,65,0.1);}
  @keyframes scan-line{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
  .ph{font-family:'Orbitron',sans-serif;font-size:0.62rem;color:var(--green);letter-spacing:0.2em;border-bottom:1px solid var(--border);padding-bottom:0.75rem;margin-bottom:1rem;}
  .section-title{font-family:'Orbitron',sans-serif;font-size:0.78rem;color:var(--green);letter-spacing:0.3em;text-align:center;margin:3rem 0 1.5rem;position:relative;}
