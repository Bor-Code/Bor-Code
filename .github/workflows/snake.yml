<script>
/* MATRIX RAIN */
const canvas=document.getElementById('matrix-canvas');
const ctx=canvas.getContext('2d');
let cols,drops;
function initM(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;cols=Math.floor(canvas.width/18);drops=Array(cols).fill(1);}
initM();window.addEventListener('resize',initM);
const chars='01アイウエオカキクケコABCDEFGHIJKLM<>{}[]#$%&';
function drawM(){
  ctx.fillStyle='rgba(13,17,23,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#00ff41';ctx.font='13px Share Tech Mono';
  for(let i=0;i<drops.length;i++){
    const c=chars[Math.floor(Math.random()*chars.length)];
    ctx.globalAlpha=Math.random()*0.5+0.5;
    ctx.fillText(c,i*18,drops[i]*18);
    if(drops[i]*18>canvas.height&&Math.random()>0.975)drops[i]=0;
    drops[i]++;
  }
  ctx.globalAlpha=1;
}
setInterval(drawM,60);

/* TYPING EFFECT */
const lines=[
  'Initializing security protocols...',
  'AI anomaly detection engine: ONLINE',
  'Blue Team defense matrix: ACTIVE',
  'LSTM model accuracy: 98.2%',
  'Threat hunting mode: ENGAGED',
  'LLM + SIEM bridge: OPERATIONAL',
  'All systems nominal. Welcome, Operative.',
];
let li=0,ci=0,fwd=true;
const tel=document.getElementById('typing-text');
function typeLoop(){
  if(fwd){
    tel.textContent=lines[li].slice(0,ci++);
    if(ci>lines[li].length){fwd=false;setTimeout(typeLoop,1800);return;}
  }else{
    tel.textContent=lines[li].slice(0,ci--);
    if(ci<0){ci=0;fwd=true;li=(li+1)%lines.length;}
  }
  setTimeout(typeLoop,fwd?55:25);
}
typeLoop();

/* SKILL BARS ON SCROLL */
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.querySelectorAll('.skill-fill').forEach(b=>b.style.width=b.dataset.pct+'%');
    }
  });
},{threshold:0.2});
document.querySelectorAll('.panel').forEach(p=>obs.observe(p));

/* METRIC COUNTERS */
function counter(el,target,suffix=''){
  let v=0,step=target/80;
  function go(){
    v=Math.min(v+step,target);
    el.textContent=Math.floor(v).toLocaleString()+suffix;
    if(v<target)requestAnimationFrame(go);
    else el.textContent=target.toLocaleString()+suffix;
  }
  requestAnimationFrame(go);
}
const mobs=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting){
    counter(document.getElementById('m1'),98,'%');
    setTimeout(()=>document.getElementById('m1').textContent='98.2%',1500);
    counter(document.getElementById('m2'),2847);
    counter(document.getElementById('m3'),12847);
    counter(document.getElementById('m4'),15);
    mobs.disconnect();
  }
},{threshold:0.3});
mobs.observe(document.querySelector('.grid-3'));

/* MOUSE TRAIL */
const trailDots=[];
for(let i=0;i<6;i++){
  const d=document.createElement('div');
  d.className='mouse-dot';
  d.style.cssText=`opacity:${0.8-i*0.12};transform:scale(${1-i*0.12});`;
  document.body.appendChild(d);
  trailDots.push({el:d,x:0,y:0});
}
let mx=0,my=0;
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
function trailLoop(){
  trailDots[0].x+=(mx-trailDots[0].x)*0.35;
  trailDots[0].y+=(my-trailDots[0].y)*0.35;
  trailDots[0].el.style.left=(trailDots[0].x-2.5)+'px';
  trailDots[0].el.style.top=(trailDots[0].y-2.5)+'px';
  for(let i=1;i<trailDots.length;i++){
    trailDots[i].x+=(trailDots[i-1].x-trailDots[i].x)*0.4;
    trailDots[i].y+=(trailDots[i-1].y-trailDots[i].y)*0.4;
    trailDots[i].el.style.left=(trailDots[i].x-2.5)+'px';
    trailDots[i].el.style.top=(trailDots[i].y-2.5)+'px';
    trailDots[i].el.style.opacity=0.6-i*0.1;
  }
  requestAnimationFrame(trailLoop);
}
trailLoop();

/* SMOOTH SCROLL */
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    document.querySelector(a.getAttribute('href'))?.scrollIntoView({behavior:'smooth'});
  });
});
</script>
