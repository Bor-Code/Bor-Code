  .skill-item{margin-bottom:0.9rem;}
  .skill-label{display:flex;justify-content:space-between;font-size:0.73rem;margin-bottom:0.3rem;}
  .skill-pct{color:var(--green);}
  .skill-track{height:5px;background:rgba(0,255,65,0.1);border:1px solid rgba(0,255,65,0.2);}
  .skill-fill{height:100%;background:linear-gradient(90deg,var(--green-dark),var(--green));box-shadow:0 0 8px rgba(0,255,65,0.5);width:0;transition:width 1.6s cubic-bezier(0.25,0.46,0.45,0.94);}
  .cert-card{display:flex;align-items:center;gap:0.75rem;padding:0.55rem 0.75rem;border:1px solid rgba(0,255,65,0.12);margin-bottom:0.4rem;transition:all 0.3s;background:rgba(0,48,16,0.1);}
