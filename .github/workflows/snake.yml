  .roadmap-item{display:flex;align-items:center;gap:0.6rem;padding:0.35rem 0;border-bottom:1px solid rgba(0,255,65,0.05);font-size:0.73rem;}
  .rm-label{flex:1;}
  .rm-bar{width:100px;height:3px;background:rgba(0,255,65,0.1);}
  .rm-fill{height:100%;}
  .rm-fill.done{background:var(--green);}
  .rm-fill.wip{background:#88ff44;}
  .rm-fill.q{background:rgba(0,255,65,0.15);}
  .rm-pct{font-size:0.63rem;min-width:3.5rem;text-align:right;}
  .footer{text-align:center;padding:3rem 0 2rem;font-size:0.65rem;color:rgba(0,255,65,0.35);border-top:1px solid rgba(0,255,65,0.1);margin-top:4rem;letter-spacing:0.2em;}
  .mouse-dot{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--green);pointer-events:none;z-index:9998;box-shadow:0 0 5px var(--green);}
  .corner{position:fixed;width:35px;height:35px;border-color:var(--green);border-style:solid;opacity:0.25;pointer-events:none;z-index:9998;}
  .c-tl{top:16px;left:16px;border-width:2px 0 0 2px;}
  .c-br{bottom:16px;right:16px;border-width:0 2px 2px 0;}
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,17,23,0.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,255,65,0.15);padding:0.55rem 1.5rem;display:flex;justify-content:space-between;align-items:center;}
  .nav-brand{font-family:'Orbitron',sans-serif;font-size:0.72rem;color:var(--green);letter-spacing:0.2em;}
  .nav-links{display:flex;gap:1.5rem;}
  .nav-link{font-size:0.65rem;color:var(--text);text-decoration:none;letter-spacing:0.1em;transition:color 0.2s;}
  .nav-link:hover{color:var(--green);}
  section{margin-bottom:1.5rem;}
  .row-info{font-size:0.76rem;line-height:2;}
</style>
</head>
