  .metric-value{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:700;color:var(--green);text-shadow:0 0 15px rgba(0,255,65,0.6);}
  .metric-label{font-size:0.58rem;color:var(--text);margin-top:0.3rem;letter-spacing:0.1em;}
  .links-grid{display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;}
  .link-btn{font-family:'Share Tech Mono',monospace;font-size:0.78rem;padding:0.6rem 1.2rem;border:1px solid var(--border);color:var(--text);text-decoration:none;transition:all 0.3s;position:relative;overflow:hidden;letter-spacing:0.1em;}
